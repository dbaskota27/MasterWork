name: mobile_store_app
description: Mobile Store POS — inventory, sales, invoices, customers, reports.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.0

  # Barcode / QR scanning
  mobile_scanner: ^5.2.3

  # PDF receipt generation
  pdf: ^3.11.0
  printing: ^5.13.0

  # QR code display
  qr_flutter: ^4.1.0

  # Backup export / import
  share_plus: ^10.0.0
  file_picker: ^8.1.7

  # Local storage
  shared_preferences: ^2.3.0

  # Number / date formatting
  intl: ^0.19.0

  # URL launcher (SMS, WhatsApp)
  url_launcher: ^6.2.5

  # Misc UI
  flutter_slidable: ^3.1.0
  google_fonts: ^6.2.1
  gap: ^3.0.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
